<div class="modal-backdrop" role="presentation" (click)="closeModal()">
  <section
    class="modal-card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="vehicle-form-title"
    (click)="$event.stopPropagation()"
  >
    <header class="modal-header">
      <div>
        <span class="eyebrow">Vehículos</span>
        <h2 id="vehicle-form-title">{{ modalTitle }}</h2>
        <p>{{ modalDescription }}</p>
      </div>

      <button type="button" class="close-button" (click)="closeModal()">
        ×
      </button>
    </header>

    <form
      [formGroup]="vehicleForm"
      (ngSubmit)="submitForm()"
      class="modal-form"
    >
      <section class="form-section">
        <h3>Datos del vehículo</h3>

        <div class="form-grid">
          <label class="form-field">
            <span>Placa *</span>
            <input
              type="text"
              formControlName="plateNumber"
              placeholder="Ej. 123ABC"
            />
            <small *ngIf="isInvalid('plateNumber')">
              La placa del vehículo es obligatoria.
            </small>
          </label>

          <label class="form-field">
            <span>Marca *</span>
            <input
              type="text"
              formControlName="brand"
              placeholder="Ej. Toyota"
            />
            <small *ngIf="isInvalid('brand')">
              La marca del vehículo es obligatoria.
            </small>
          </label>

          <label class="form-field">
            <span>Modelo *</span>
            <input
              type="text"
              formControlName="model"
              placeholder="Ej. Corolla"
            />
            <small *ngIf="isInvalid('model')">
              El modelo del vehículo es obligatorio.
            </small>
          </label>

          <label class="form-field">
            <span>Año</span>
            <input
              type="number"
              formControlName="year"
              placeholder="Ej. 2018"
            />
          </label>

          <label class="form-field">
            <span>Color</span>
            <input
              type="text"
              formControlName="color"
              placeholder="Ej. Blanco"
            />
          </label>

          <label class="form-field">
            <span>VIN / Chasis</span>
            <input
              type="text"
              formControlName="vin"
              placeholder="Número de chasis o VIN"
            />
          </label>
        </div>
      </section>

      <section class="form-section">
        <h3>Datos del cliente</h3>

        <div class="form-grid">
          <label class="form-field">
            <span>Cliente *</span>
            <input
              type="text"
              formControlName="customerName"
              placeholder="Ej. Juan Pérez"
            />
            <small *ngIf="isInvalid('customerName')">
              El nombre del cliente es obligatorio.
            </small>
          </label>

          <label class="form-field">
            <span>Teléfono *</span>
            <input
              type="tel"
              formControlName="customerPhone"
              placeholder="Ej. 70707070"
            />
            <small *ngIf="isInvalid('customerPhone')">
              El teléfono del cliente es obligatorio.
            </small>
          </label>
        </div>
      </section>

      <section class="form-section">
        <h3>Observaciones</h3>

        <div class="form-grid">
          <label class="form-field form-field--full">
            <span>Observaciones generales</span>
            <textarea
              rows="4"
              formControlName="observations"
              placeholder="Ej. Vehículo registrado para mantenimiento general."
            ></textarea>
          </label>
        </div>
      </section>

      <footer class="modal-actions">
        <button type="button" class="secondary-button" (click)="closeModal()">
          Cancelar
        </button>

        <button type="submit" class="primary-button">
          {{ vehicle ? "Guardar cambios" : "Registrar vehículo" }}
        </button>
      </footer>
    </form>
  </section>
</div>
