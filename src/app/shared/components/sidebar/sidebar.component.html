<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">
      <img
        *ngIf="!logoMissing"
        src="/images/caned-logo.png"
        alt="CANEDO Tecnología Automotriz"
        (error)="logoMissing = true"
      />

      <div *ngIf="logoMissing" class="brand-fallback">
        <strong>CANED</strong>
        <span>Tecnología Automotriz</span>
      </div>
    </div>

    <button
      type="button"
      class="mobile-menu-button"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen"
      aria-label="Abrir o cerrar menú"
    >
      <span class="mobile-menu-button__icon"></span>
      <span class="mobile-menu-button__text"></span>
    </button>
  </div>

  <a
    class="primary-action"
    routerLink="/vehicle-intake/new"
    (click)="closeMobileMenu()"
  >
    <span class="primary-action__icon">+</span>
    <span>
      <strong>Nuevo ingreso</strong>
      <small>Registrar vehículo</small>
    </span>
  </a>

  <div
    class="mobile-menu-backdrop"
    *ngIf="isMobileMenuOpen"
    (click)="closeMobileMenu()"
  ></div>

  <nav
    class="navigation"
    [class.navigation--open]="isMobileMenuOpen"
    aria-label="Menú principal"
  >
    <div class="mobile-navigation-header">
      <strong>Menú principal</strong>

      <button
        type="button"
        (click)="closeMobileMenu()"
        aria-label="Cerrar menú"
      >
        ×
      </button>
    </div>

    <section *ngFor="let group of menuGroups" class="menu-group">
      <p class="menu-title">{{ group.title }}</p>

      <a
        *ngFor="let item of group.items"
        class="menu-link"
        [class.menu-link--highlight]="item.highlight"
        [routerLink]="item.route"
        routerLinkActive="menu-link--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        (click)="closeMobileMenu()"
      >
        <span class="menu-icon">{{ item.icon }}</span>
        <span class="menu-label">{{ item.label }}</span>
      </a>
    </section>
  </nav>

  <div class="sidebar-footer">
    <span class="status-dot"></span>
    <div>
      <strong>Sistema interno</strong>
      <small>Gestión de taller CANEDO</small>
    </div>
  </div>
</aside>
